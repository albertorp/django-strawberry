{% load i18n %}

<!--
  Edit form fragment — rendered inside the drawer body, not as a full page.
  This template is loaded via HTMX on GET and re-rendered on a failed POST.
  hx-post targets the same update-drawer endpoint so HTMX swaps validation
  errors back in without closing the drawer or doing a full page reload.
-->
<form method="POST"
      {% if form.is_multipart %}enctype="multipart/form-data"{% endif %}
      hx-post="{{ list_view_url }}{{ object.pk }}/update-drawer/"
      hx-target="#edit-drawer-body"
      hx-swap="innerHTML">

  {% csrf_token %}

  <!-- Non-field errors (e.g. unique_together violations) -->
  {% if form.non_field_errors %}
  <div role="alert" class="alert alert-error alert-soft mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <div>
      {% for error in form.non_field_errors %}
        <div class="text-sm">{{ error }}</div>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <!-- Form fields — single-column layout (drawer is narrower than a full page form) -->
  <div class="grid grid-cols-1 gap-4 mb-6">
    {% for field in form %}
    <div class="form-control w-full">

      <!-- Label with required indicator -->
      <label class="label">
        <span class="label-text font-semibold text-sm">{{ field.label }}</span>
        {% if field.field.required %}
          <span class="label-text-alt text-error">*</span>
        {% endif %}
      </label>

      <!-- Field input — CSS classes applied by DaisyUIFormMixin on the view -->
      {{ field }}

      <!-- Optional help text shown below the input -->
      {% if field.help_text %}
        <label class="label">
          <span class="label-text-alt text-xs text-gray-500">{{ field.help_text }}</span>
        </label>
      {% endif %}

      <!-- Inline field-level validation errors -->
      {% if field.errors %}
        <label class="label">
          <span class="label-text-alt text-error text-xs">{{ field.errors|join:", " }}</span>
        </label>
      {% endif %}

    </div>
    {% endfor %}
  </div>

  <!-- Action buttons -->
  <div class="flex items-center gap-3 pt-2">
    <button type="submit" class="btn btn-primary btn-sm">
      {% trans "Save" %}
    </button>
    <!--
      Cancel closes the drawer without saving; reaches up the Alpine scope
      to call closeDrawer() which sets drawerOpen = false.
    -->
    <button type="button"
            class="btn btn-ghost btn-sm"
            @click="closeDrawer()">
      {% trans "Cancel" %}
    </button>
  </div>

</form>
